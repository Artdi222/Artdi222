<svg width="860" height="130" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 130">
  <defs>
    <style>
      .terminal-box {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        color: #00e5ff;
        background: #050a0f;
        border: 1px solid #00e5ff22;
        border-radius: 6px;
        padding: 12px 18px;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }
      .scan-line {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00e5ff44, transparent);
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0%   { top: 0%; opacity: 1; }
        90%  { opacity: 0.6; }
        100% { top: 100%; opacity: 0; }
      }
      .header-line {
        color: #ff6b00;
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 6px;
        font-size: 11px;
        opacity: 0;
        animation: appear 0.4s ease forwards 0.2s;
      }
      .status-row {
        display: flex;
        gap: 28px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .field { opacity: 0; }
      .field:nth-child(1) { animation: appear 0.4s ease forwards 0.5s; }
      .field:nth-child(2) { animation: appear 0.4s ease forwards 0.8s; }
      .field:nth-child(3) { animation: appear 0.4s ease forwards 1.1s; }
      .field:nth-child(4) { animation: appear 0.4s ease forwards 1.4s; }
      .label { color: #ff6b0088; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
      .value { color: #00e5ff; font-size: 12px; font-weight: bold; }
      .blink-dot {
        display: inline-block;
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #00ff88;
        margin-right: 6px;
        vertical-align: middle;
        animation: blink 1.2s step-start infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes appear {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .sep { color: #00e5ff22; margin: 5px 0; font-size: 10px; letter-spacing: 4px; }
    </style>
  </defs>
  <rect width="860" height="130" fill="#050a0f" rx="6"/>
  <rect x="0" y="0" width="860" height="130" rx="6" fill="none" stroke="#00e5ff" stroke-opacity="0.15" stroke-width="1"/>
  <foreignObject x="0" y="0" width="860" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" class="terminal-box">
      <div class="scan-line"></div>
      <div class="header-line">▌ PENGUIN LOGISTICS — SECURE DISPATCH TERMINAL v2.04 ▌ LUNGMEN BRANCH ▌</div>
      <div class="sep">────────────────────────────────────────────────────────────────────</div>
      <div class="status-row">
        <div class="field">
          <div class="label">Operator</div>
          <div class="value">Artdi · #204</div>
        </div>
        <div class="field">
          <div class="label">Node</div>
          <div class="value">Depok · Terra</div>
        </div>
        <div class="field">
          <div class="label">Division</div>
          <div class="value">Digital Infra</div>
        </div>
        <div class="field">
          <div class="label">Status</div>
          <div class="value"><span class="blink-dot"></span>ON DUTY</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
